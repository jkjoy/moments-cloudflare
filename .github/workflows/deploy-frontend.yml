name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NUXT_PUBLIC_API_BASE: ${{ vars.NUXT_PUBLIC_API_BASE }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deploy variables
        shell: bash
        run: |
          test -n "$NUXT_PUBLIC_API_BASE" || { echo "Missing GitHub variable: NUXT_PUBLIC_API_BASE"; exit 1; }
          test -n "$CLOUDFLARE_PAGES_PROJECT_NAME" || { echo "Missing GitHub variable: CLOUDFLARE_PAGES_PROJECT_NAME"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx nuxi typecheck

      - name: Build
        run: npm run build

      - name: Deploy Pages
        run: npx wrangler pages deploy .output/public --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" --branch "${{ github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
