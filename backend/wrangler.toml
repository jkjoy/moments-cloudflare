name = "moments-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "moments-db"
database_id = "34d9f779-a4df-4e61-9598-8dd82375f578"

# R2 存储绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "moments-storage"

# KV 缓存绑定
# 先执行 `wrangler kv namespace create CACHE`，再把返回的 id 填到这里并取消注释。
[[kv_namespaces]]
binding = "CACHE"
id = "d0dfb1af2f4747f695b2ceb9d744333e"

# 环境变量
#[vars]
#JWT_SECRET = "your-jwt-secret-change-in-production"
#CORS_ORIGIN = "*"
